<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Random Chaos</title>
<style>
    body {
        margin: 0;
        overflow: hidden;
        background: black;
        font-family: monospace;
        color: white;
    }
    #text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        font-size: 2rem;
        text-align: center;
    }
    .box {
        position: absolute;
        width: 30px;
        height: 30px;
        background: red;
        border-radius: 6px;
    }
</style>
</head>
<body>

<div id="text">Click anywhere 😈</div>

<script>
const messages = [
    "why did you click that",
    "stop it",
    "ok keep going",
    "this is getting weird",
    "you found nothing",
    "or did you..."
];

document.addEventListener("click", (e) => {
    // change text
    document.getElementById("text").innerText =
        messages[Math.floor(Math.random() * messages.length)];

    // spawn random box
    const box = document.createElement("div");
    box.classList.add("box");
    box.style.left = e.clientX + "px";
    box.style.top = e.clientY + "px";

    // random color
    box.style.background = `hsl(${Math.random()*360}, 100%, 50%)`;

    document.body.appendChild(box);

    // make it fly away
    let x = e.clientX;
    let y = e.clientY;
    let dx = (Math.random() - 0.5) * 10;
    let dy = (Math.random() - 0.5) * 10;

    function animate() {
        x += dx;
        y += dy;
        box.style.left = x + "px";
        box.style.top = y + "px";
        requestAnimationFrame(animate);
    }
    animate();
});
</script>

</body>
</html>
